name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Jekyll source
        run: |
          mkdir -p pages/assets
          cat > pages/index.md <<'EOF'
          ---
          layout: default
          title: Deye solar inverter monitoring
          ---
          EOF
          tail -n +1 README.md >> pages/index.md
          # GitHub project pages live under /bkw_tracker/ — fix asset URLs for HTML <img> tags
          sed -i 's|src="assets/|src="/bkw_tracker/assets/|g' pages/index.md
          for asset in image.png architecture.svg read-cycle.svg recovery-cycle.svg; do
            if [ -f "assets/${asset}" ]; then
              cp "assets/${asset}" "pages/assets/${asset}"
            fi
          done
          cat > pages/_config.yml <<'EOF'
          title: Deye solar inverter monitoring
          description: MQTT pipeline for Deye micro-inverters and Home Assistant
          theme: jekyll-theme-cayman
          markdown: GFM
          baseurl: "/bkw_tracker"
          url: "https://henba1.github.io"
          EOF
      - uses: actions/jekyll-build-pages@v1
        with:
          source: pages
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
