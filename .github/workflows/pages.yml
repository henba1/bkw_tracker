name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Jekyll source
        run: |
          mkdir -p pages/assets pages/_includes
          cp README.md pages/index.md
          if [ -f assets/image.png ]; then
            cp assets/image.png pages/assets/image.png
          fi
          cat > pages/_config.yml <<'EOF'
          title: Deye solar inverter monitoring
          description: MQTT pipeline for Deye micro-inverters and Home Assistant
          theme: jekyll-theme-cayman
          markdown: GFM
          EOF
          cat > pages/_includes/footer-custom.html <<'EOF'
          <script type="module">
            import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
            mermaid.initialize({ startOnLoad: false, theme: "neutral" });
            for (const code of document.querySelectorAll("code.language-mermaid")) {
              const wrapper = code.closest("div.highlighter-rouge") ?? code.parentElement;
              const graph = document.createElement("pre");
              graph.className = "mermaid";
              graph.textContent = code.textContent;
              wrapper?.replaceWith(graph);
            }
            await mermaid.run({ querySelector: ".mermaid" });
          </script>
          EOF
      - uses: actions/jekyll-build-pages@v1
        with:
          source: pages
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
