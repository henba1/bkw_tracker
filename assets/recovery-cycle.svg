<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 920" role="img" aria-label="Failed read with resilience recovery: logger-resilience probes the logger and restarts deye-bridge on success">
  <defs>
    <marker id="arrow-solid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#57606a"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#57606a"/>
    </marker>
    <marker id="arrow-fail" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#cf222e"/>
    </marker>
  </defs>
  <style>
    .participant { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .lifeline { stroke: #d0d7de; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
    .frame { fill: none; stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .frame-label { font: 600 11px system-ui, sans-serif; fill: #57606a; }
    .title { font: 600 11px system-ui, sans-serif; fill: #24292f; }
    .msg { font: 11px system-ui, sans-serif; fill: #24292f; }
    .note { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
    .note-text { font: 10px system-ui, sans-serif; fill: #24292f; }
    .side-note { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .side-text { font: 10px system-ui, sans-serif; fill: #57606a; }
    .num { font: 10px system-ui, sans-serif; fill: #57606a; }
    .arrow-solid { stroke: #57606a; stroke-width: 1.5; fill: none; marker-end: url(#arrow-solid); }
    .arrow-dashed { stroke: #57606a; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow-dashed); }
    .arrow-fail { stroke: #cf222e; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow-fail); }
    .fail-text { font: 11px system-ui, sans-serif; fill: #cf222e; }
  </style>

  <!-- Participants -->
  <rect class="participant" x="20" y="18" width="120" height="36" rx="6"/>
  <text class="title" x="80" y="41" text-anchor="middle">deye-bridge</text>
  <rect class="participant" x="170" y="18" width="100" height="36" rx="6"/>
  <text class="title" x="220" y="41" text-anchor="middle">Logger</text>
  <rect class="participant" x="300" y="18" width="110" height="36" rx="6"/>
  <text class="title" x="355" y="41" text-anchor="middle">Mosquitto</text>
  <rect class="participant" x="440" y="18" width="140" height="36" rx="6"/>
  <text class="title" x="510" y="41" text-anchor="middle">logger-resilience</text>
  <rect class="participant" x="610" y="18" width="140" height="36" rx="6"/>
  <text class="title" x="680" y="41" text-anchor="middle">Home Assistant</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="80" y1="54" x2="80" y2="860"/>
  <line class="lifeline" x1="220" y1="54" x2="220" y2="860"/>
  <line class="lifeline" x1="355" y1="54" x2="355" y2="860"/>
  <line class="lifeline" x1="510" y1="54" x2="510" y2="860"/>
  <line class="lifeline" x1="680" y1="54" x2="680" y2="860"/>

  <!-- Bottom boxes -->
  <rect class="participant" x="20" y="860" width="120" height="36" rx="6"/>
  <text class="title" x="80" y="883" text-anchor="middle">deye-bridge</text>
  <rect class="participant" x="170" y="860" width="100" height="36" rx="6"/>
  <text class="title" x="220" y="883" text-anchor="middle">Logger</text>
  <rect class="participant" x="300" y="860" width="110" height="36" rx="6"/>
  <text class="title" x="355" y="883" text-anchor="middle">Mosquitto</text>
  <rect class="participant" x="440" y="860" width="140" height="36" rx="6"/>
  <text class="title" x="510" y="883" text-anchor="middle">logger-resilience</text>
  <rect class="participant" x="610" y="860" width="140" height="36" rx="6"/>
  <text class="title" x="680" y="883" text-anchor="middle">Home Assistant</text>

  <!-- 1 DB -> LG -->
  <text class="num" x="8" y="88">1</text>
  <line class="arrow-solid" x1="80" y1="84" x2="220" y2="84"/>
  <text class="msg" x="150" y="76" text-anchor="middle">UDP WIFIKIT + AT+INVDATA</text>

  <!-- 2 LG -x DB -->
  <text class="num" x="8" y="128">2</text>
  <line class="arrow-fail" x1="220" y1="124" x2="80" y2="124"/>
  <text class="fail-text" x="150" y="116" text-anchor="middle">Timeouts (module busy / asleep / WiFi flap)</text>

  <!-- 3 DB -> MQ -->
  <text class="num" x="8" y="168">3</text>
  <line class="arrow-solid" x1="80" y1="164" x2="355" y2="164"/>
  <text class="msg" x="218" y="156" text-anchor="middle">PUBLISH logger_status = offline</text>
  <rect class="side-note" x="692" y="150" width="130" height="28" rx="4"/>
  <text class="side-text" x="757" y="168" text-anchor="middle">Sensors unavailable</text>

  <!-- 4 MQ to LR -->
  <text class="num" x="8" y="208">4</text>
  <line class="arrow-dashed" x1="355" y1="204" x2="510" y2="204"/>
  <text class="msg" x="432" y="196" text-anchor="middle">logger_status = offline</text>
  <rect class="side-note" x="528" y="190" width="170" height="40" rx="4"/>
  <text class="side-text" x="613" y="206" text-anchor="middle">Skip if quiet hours (00:00-04:45)</text>
  <text class="side-text" x="613" y="220" text-anchor="middle">else check 90s cooldown</text>

  <!-- loop frame -->
  <rect class="frame" x="170" y="248" width="360" height="72" rx="6"/>
  <text class="frame-label" x="178" y="262">loop Up to LOGGER_WAKEUP_ATTEMPTS (8s apart)</text>
  <text class="num" x="8" y="292">5</text>
  <line class="arrow-solid" x1="510" y1="288" x2="220" y2="288"/>
  <text class="msg" x="365" y="280" text-anchor="middle">UDP 48899 - WIFIKIT probe</text>

  <!-- alt frame -->
  <rect class="frame" x="12" y="340" width="896" height="500" rx="8"/>
  <text class="frame-label" x="20" y="356">alt Probe succeeds / All probes fail</text>

  <!-- alt: success branch -->
  <line x1="12" y1="372" x2="908" y2="372" stroke="#8c959f" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="frame-label" x="20" y="388">Probe succeeds</text>

  <text class="num" x="8" y="416">6</text>
  <line class="arrow-dashed" x1="220" y1="412" x2="510" y2="412"/>
  <text class="msg" x="365" y="404" text-anchor="middle">IP, MAC, serial</text>

  <text class="num" x="8" y="456">7</text>
  <line class="arrow-solid" x1="510" y1="452" x2="80" y2="452"/>
  <text class="msg" x="295" y="444" text-anchor="middle">docker restart deye-bridge</text>

  <text class="num" x="8" y="496">8</text>
  <line class="arrow-solid" x1="80" y1="492" x2="220" y2="492"/>
  <text class="msg" x="150" y="484" text-anchor="middle">Full read cycle</text>

  <text class="num" x="8" y="536">9</text>
  <line class="arrow-dashed" x1="220" y1="532" x2="80" y2="532"/>
  <text class="msg" x="150" y="524" text-anchor="middle">Modbus payload</text>

  <text class="num" x="8" y="576">10</text>
  <line class="arrow-solid" x1="80" y1="572" x2="355" y2="572"/>
  <text class="msg" x="218" y="564" text-anchor="middle">metrics + logger_status = online</text>

  <text class="num" x="8" y="616">11</text>
  <line class="arrow-dashed" x1="355" y1="612" x2="680" y2="612"/>
  <text class="msg" x="518" y="604" text-anchor="middle">Sensors recover</text>

  <!-- alt: failure branch -->
  <line x1="12" y1="648" x2="908" y2="648" stroke="#8c959f" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="frame-label" x="20" y="664">All probes fail</text>

  <text class="num" x="8" y="692">12</text>
  <line class="arrow-solid" x1="510" y1="688" x2="355" y2="688"/>
  <text class="msg" x="432" y="680" text-anchor="middle">PUBLISH _meta/resilience (JSON)</text>

  <rect class="note" x="28" y="712" width="190" height="34" rx="4"/>
  <text class="note-text" x="123" y="733" text-anchor="middle">Next scheduled read in 30s</text>
</svg>
