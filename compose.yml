# Root stack compose. Always run via scripts/stack.sh.
name: bkw_tracker

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/data:/mosquitto/data

  # Optional acquisition adapter — omit when ACQUISITION_ADAPTER=external in stack.env
  # (your hardware or another bridge publishes directly to Mosquitto).
  deye-bridge:
    image: ghcr.io/kbialek/deye-inverter-mqtt:latest
    container_name: deye-bridge
    restart: unless-stopped
    env_file: ./deye-bridge/config.env

  # Spaced LAN wakeup probes when deye-bridge publishes logger_status=offline.
  logger-resilience:
    profiles: ["resilience"]
    build:
      context: .
      dockerfile: logger-resilience/Dockerfile
    container_name: logger-resilience
    restart: unless-stopped
    network_mode: host
    env_file: ./stack.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      - mosquitto
